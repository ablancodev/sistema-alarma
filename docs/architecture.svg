<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <style>
      .box { rx: 14; }
      .t { fill:#0f172a; font-weight:700; }
      .s { fill:#475569; font-size:14px; }
      .lbl { fill:#334155; font-size:13px; }
      .badge { font-size:12px; font-weight:700; fill:#fff; }
    </style>
  </defs>

  <rect x="0" y="0" width="1080" height="560" fill="#f8fafc"/>
  <text x="40" y="48" font-size="26" class="t">📷 Sistema de vigilancia local con IA opcional</text>

  <!-- Móvil -->
  <rect x="40" y="210" width="200" height="150" rx="16" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="140" y="270" text-anchor="middle" font-size="34">📱</text>
  <text x="140" y="305" text-anchor="middle" class="t" font-size="17">Móvil (PWA)</text>
  <text x="140" y="328" text-anchor="middle" class="s">Cámara · sin apps</text>

  <!-- Flecha móvil -> servidor -->
  <line x1="240" y1="285" x2="330" y2="285" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="285" y="262" text-anchor="middle" class="lbl">foto cada X s</text>
  <text x="285" y="278" text-anchor="middle" class="lbl" fill="#16a34a">LAN · privada</text>

  <!-- Servidor -->
  <rect x="340" y="90" width="700" height="400" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="365" y="128" class="t" font-size="18">🖥️ Servidor (Docker)</text>

  <!-- FastAPI -->
  <rect x="370" y="150" width="640" height="64" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="392" y="180" class="t" font-size="16">FastAPI</text>
  <text x="392" y="201" class="s">Recibe la imagen y sirve la web</text>

  <!-- OpenCV -->
  <rect x="370" y="226" width="640" height="64" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="392" y="256" class="t" font-size="16">OpenCV · detección de movimiento</text>
  <text x="392" y="277" class="s">Resta de imágenes (rápido, sin IA)</text>
  <rect x="930" y="240" width="60" height="22" rx="11" fill="#16a34a"/>
  <text x="960" y="255" text-anchor="middle" class="badge">v1.0</text>

  <!-- Ollama -->
  <rect x="370" y="302" width="640" height="64" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="392" y="332" class="t" font-size="16">Ollama + moondream · interpreta la escena</text>
  <text x="392" y="353" class="s">IA local, solo si el cambio supera el umbral</text>
  <rect x="930" y="316" width="60" height="22" rx="11" fill="#7c3aed"/>
  <text x="960" y="331" text-anchor="middle" class="badge">v2.0</text>

  <!-- Telegram -->
  <rect x="370" y="400" width="640" height="60" rx="12" fill="#ecfeff" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="392" y="436" class="t" font-size="16">📲 Telegram — foto + descripción</text>

  <!-- Flechas internas -->
  <line x1="690" y1="214" x2="690" y2="226" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="690" y1="290" x2="690" y2="302" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="690" y1="366" x2="690" y2="400" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="40" y="528" font-size="14" fill="#334155">🔒 Local-first: todo funciona offline; solo la notificación sale a internet.</text>
</svg>
